server {
    listen 80;
    server_name your-domain.com;
    root /www/wwwroot/nexus-mall/public;
    index index.php;

    # API路由 - 直接将所有/api/请求转发到api/index.php
    location /api/ {
        if (!-f $request_filename) {
            rewrite ^/api/(.*)$ /api/index.php last;
        }
    }

    # 后台管理
    location /admin {
        rewrite ^/admin$ /admin.php last;
        rewrite ^/admin/(.*)$ /admin.php?page=$1 last;
    }

    # 安装
    location /install {
        rewrite ^/install$ /install.php last;
    }

    # 前台页面
    location ~ ^/(product|cart|checkout|cashier|pay-result|user|user-products|user-orders|user-withdrawals)$ {
        try_files $uri $uri.php$is_args$args;
    }

    location ~ ^/product/([0-9]+)$ {
        rewrite ^/product/([0-9]+)$ /product.php?id=$1 last;
    }

    # PHP处理
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # 静态资源缓存
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        access_log off;
    }

    # 上传目录禁止执行PHP
    location /uploads/ {
        location ~* \.php$ {
            deny all;
        }
    }

    # 禁止直接访问敏感文件
    location ~ /\.(ht|git|env) {
        deny all;
    }
}
